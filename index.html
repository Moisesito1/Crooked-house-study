<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards de Vocabulario (30 Palabras)</title>
    <style>
        :root {
            --bg-color: #0f172a;        /* Azul oscuro profundo */
            --card-bg: #1e293b;         /* Azul de la tarjeta */
            --text-primary: #f59e0b;    /* Amarillo/Naranja vibrante */
            --text-secondary: #94a3b8;  /* Gris claro para fonética y traducciones */
            --text-muted: #64748b;       /* Gris oscuro para elementos secundarios */
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            --border-radius: 20px;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            color: var(--text-primary);
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-align: center;
        }

        /* Selector de Grupos (Blocks) */
        .block-selector {
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .block-btn {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .block-btn.active {
            background-color: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Estructura de la Tarjeta */
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 400px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: var(--border-radius);
            background-color: var(--card-bg);
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #1e294b;
        }

        /* Nueva línea gráfica de figuras sugerentes */
        .graphic-icon {
            font-size: 4.8rem;
            margin-top: 10px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.25));
            user-select: none;
        }

        .word {
            color: var(--text-primary);
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin: 15px 0 5px 0;
        }

        .phonetic {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-style: italic;
            margin-bottom: 20px;
        }

        .action-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        /* Reverso de la Tarjeta */
        .translation {
            color: var(--text-primary);
            font-size: 2rem;
            font-weight: 700;
            margin-top: 20px;
        }

        .example-sentence {
            color: #ffffff;
            font-size: 1.1rem;
            line-height: 1.5;
            margin: 20px 0;
            max-width: 90%;
        }

        .example-translation {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-style: italic;
        }

        /* Controles inferiores */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 10px;
        }

        .btn {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
        }

        .counter {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h1>English Vocabulary</h1>

    <!-- Selector de Bloques de Estudio -->
    <div class="block-selector" id="blockSelector">
        <!-- Generado dinámicamente -->
    </div>

    <div class="container">
        <!-- Tarjeta Interactiva -->
        <div class="card-container" id="cardContainer">
            <div class="card-inner">
                <!-- Frente (Pregunta) -->
                <div class="card-front">
                    <div class="graphic-icon" id="cardIcon">🧠</div>
                    <div>
                        <div class="word" id="cardWord">Word</div>
                        <div class="phonetic" id="cardPhonetic">/phonetic/</div>
                    </div>
                    <div class="action-text">Click to flip</div>
                </div>
                <!-- Reverso (Respuesta) -->
                <div class="card-back">
                    <div class="translation" id="cardTranslation">Traducción</div>
                    <div>
                        <div class="example-sentence" id="cardExample">Example sentence in English.</div>
                        <div class="example-translation" id="cardExampleTrans">Traducción del ejemplo.</div>
                    </div>
                    <div class="action-text">Click to flip</div>
                </div>
            </div>
        </div>

        <!-- Controles de Navegación -->
        <div class="controls">
            <button class="btn" id="prevBtn">← Anterior</button>
            <span class="counter" id="cardCounter">1 / 5</span>
            <button class="btn" id="nextBtn">Siguiente →</button>
        </div>
    </div>

    <script>
        // Set de 30 palabras con los nuevos gráficos corregidos y sugerentes
        const vocabularyData = [
            // BLOCK 1
            { word: "Shrewd", phonetic: "/ʃruːd/", translation: "Astuto / Perspicaz", icon: "🧠", example: "She made a shrewd investment decision.", exampleTrans: "Tomó una decisión de inversión astuta.", block: 1 },
            { word: "Cunning", phonetic: "/ˈkʌn.ɪŋ/", translation: "Astuto / Sagaz", icon: "🦊", example: "The cunning fox slipped away quietly.", exampleTrans: "El zorro astuto se escabulló silenciosamente.", block: 1 },
            { word: "Standoffish", phonetic: "/ˌstændˈɒf.ɪʃ/", translation: "Distante / Frío", icon: "🙉", example: "He was quiet and standoffish at the meeting.", exampleTrans: "Estuvo callado y distante en la reunión.", block: 1 },
            { word: "To point out", phonetic: "/tuː pɔɪnt aʊt/", translation: "Señalar / Indicar", icon: "👉", example: "I would like to point out some errors.", exampleTrans: "Me gustaría señalar algunos errores.", block: 1 },
            { word: "To snoop", phonetic: "/tuː snuːp/", translation: "Fisgonear", icon: "👀", example: "She caught him trying to snoop around.", exampleTrans: "Lo atrapó intentando fisgonear por ahí.", block: 1 },

            // BLOCK 2
            { word: "Gullible", phonetic: "/ˈɡʌl.ə.bəl/", translation: "Ingenuo / Crédulo", icon: "🐠", example: "He is so gullible he believes anything.", exampleTrans: "Es tan ingenuo que se cree cualquier cosa.", block: 2 },
            { word: "Desolate", phonetic: "/ˈdes.əl.ət/", translation: "Desolado / Solitario", icon: "🏜️", example: "We drove through a desolate landscape.", exampleTrans: "Conducimos a través de un paisaje desolado.", block: 2 },
            { word: "To commute", phonetic: "/tuː kəˈmjuːt/", translation: "Viajar al trabajo", icon: "🚆", example: "He commutes to the city every morning.", exampleTrans: "Él viaja diariamente a la ciudad por la mañana.", block: 2 },
            { word: "Flaking", phonetic: "/ˈfleɪ.kɪŋ/", translation: "Descarapelado / Desprendido", icon: "🍂", example: "The old paint is flaking off the wood.", exampleTrans: "La pintura vieja se está desprendiendo de la madera.", block: 2 },
            { word: "Stain", phonetic: "/steɪn/", translation: "Barniz / Tinte / Mancha", icon: "🖌️", example: "Apply a dark stain to protect the table.", exampleTrans: "Aplica un tinte oscuro para proteger la mesa.", block: 2 },

            // BLOCK 3
            { word: "Resin", phonetic: "/ˈrez.ɪn/", translation: "Resina", icon: "🌲", example: "Pine trees secrete natural resin.", exampleTrans: "Los pinos secretan resina natural.", block: 3 },
            { word: "Knots", phonetic: "/nɒts/", translation: "Nudos (en madera)", icon: "🪵", example: "This wood board has too many knots.", exampleTrans: "Esta tabla de madera tiene demasiados nudos.", block: 3 },
            { word: "Fascinating", phonetic: "/ˈfæs.ɪ.neɪ.tɪŋ/", translation: "Fascinante", icon: "🤩", example: "The history of the forest is fascinating.", exampleTrans: "La historia del bosque es fascinante.", block: 3 },
            { word: "To trigger", phonetic: "/tuː ˈtrɪɡ.ər/", translation: "Desencadenar / Activar", icon: "⚡", example: "Certain foods can trigger an allergic reaction.", exampleTrans: "Ciertos alimentos pueden desencadenar una reacción alérgica.", block: 3 },
            { word: "To tackle", phonetic: "/tuː ˈtæk.əl/", translation: "Abordar / Enfrentar", icon: "🏈", example: "We need to tackle the issue immediately.", exampleTrans: "Necesitamos abordar el problema de inmediato.", block: 3 },

            // BLOCK 4
            { word: "Overwhelming", phonetic: "/ˌoʊ.vərˈwel.mɪŋ/", translation: "Abrumador", icon: "🌊", example: "The response from the public was overwhelming.", exampleTrans: "La respuesta del público fue abrumadora.", block: 4 },
            { word: "Reluctance", phonetic: "/rɪˈlʌk.təns/", translation: "Reticencia / Recelo", icon: "🫣", example: "She showed reluctance to sign the document.", exampleTrans: "Mostró reticencia a firmar el documento.", block: 4 },
            { word: "To double down", phonetic: "/tuː ˈdʌb.əl daʊn/", translation: "Redoblar esfuerzos", icon: "🎰", example: "They decided to double down on their strategy.", exampleTrans: "Decidieron redoblar esfuerzos en su estrategia.", block: 4 },
            { word: "At all", phonetic: "/æt ɔːl/", translation: "Para nada / En absoluto", icon: "❌", example: "I am not tired at all.", exampleTrans: "No estoy cansado en absoluto.", block: 4 },
            { word: "Knackered", phonetic: "/ˈnæk.ərd/", translation: "Agotado / Hecho polvo", icon: "😪", example: "I was completely knackered after work.", exampleTrans: "Estaba completamente agotado después del trabajo.", block: 4 },

            // BLOCK 5
            { word: "Silt", phonetic: "/sɪlt/", translation: "Limo / Sedimento", icon: "⏳", example: "The well water was blocked by silt.", exampleTrans: "El agua del pozo estaba bloqueada por limo.", block: 5 },
            { word: "Clay", phonetic: "/kleɪ/", translation: "Arcilla", icon: "🏺", example: "The soil here contains too much clay.", exampleTrans: "La tierra de aquí contiene demasiada arcilla.", block: 5 },
            { word: "Drill", phonetic: "/drɪl/", translation: "Taladro / Broca", icon: "⚙️", example: "Use the correct drill bit for the metal.", exampleTrans: "Usa la broca correcta para el metal.", block: 5 },
            { word: "Crossover", phonetic: "/ˈkrɒsˌoʊ.vər/", translation: "Divisor de frecuencias", icon: "🎛️", example: "The speaker crossover filters the highs and lows.", exampleTrans: "El crossover del altavoz filtra agudos y graves.", block: 5 },
            { word: "Inverter", phonetic: "/ɪnˈvɜː.tər/", translation: "Inversor (de energía)", icon: "🔋", example: "The solar inverter converts DC to AC.", exampleTrans: "El inversor solar convierte corriente directa a alterna.", block: 5 },

            // BLOCK 6
            { word: "To lease", phonetic: "/tuː liːs/", translation: "Arrendar", icon: "🏠", example: "They decided to lease the commercial office.", exampleTrans: "Decidieron arrendar la oficina comercial.", block: 6 },
            { word: "To hedge", phonetic: "/tuː hedʒ/", translation: "Cobertura / Protegerse", icon: "🛡️", example: "Gold is often used to hedge against inflation.", exampleTrans: "El oro se usa a menudo para protegerse de la inflación.", block: 6 },
            { word: "Yield", phonetic: "/jiːld/", translation: "Rendimiento", icon: "📈", example: "This mutual fund offers a high yield.", exampleTrans: "Este fondo mutuo ofrece un alto rendimiento.", block: 6 },
            { word: "Asset", phonetic: "/ˈæs.et/", translation: "Activo / Bien", icon: "💎", example: "Real estate is a valuable asset.", exampleTrans: "Los bienes raíces son un activo valioso.", block: 6 },
            { word: "To plummet", phonetic: "/tuː ˈplʌm.ɪt/", translation: "Desplomarse / Caer en picada", icon: "📉", example: "The copper prices plummeted this morning.", exampleTrans: "Los precios del cobre se desplomaron esta mañana.", block: 6 }
        ];

        let currentBlock = 1;
        let filteredCards = [];
        let currentIndex = 0;

        const cardContainer = document.getElementById('cardContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const counterElement = document.getElementById('cardCounter');
        const blockSelector = document.getElementById('blockSelector');

        const cardIcon = document.getElementById('cardIcon');
        const cardWord = document.getElementById('cardWord');
        const cardPhonetic = document.getElementById('cardPhonetic');
        const cardTranslation = document.getElementById('cardTranslation');
        const cardExample = document.getElementById('cardExample');
        const cardExampleTrans = document.getElementById('cardExampleTrans');

        // Inicializar botones de Bloques (del 1 al 6)
        function initBlockSelectors() {
            blockSelector.innerHTML = '';
            const totalBlocks = 6;
            for (let i = 1; i <= totalBlocks; i++) {
                const btn = document.createElement('button');
                btn.className = `block-btn ${i === currentBlock ? 'active' : ''}`;
                btn.textContent = `Block ${i}`;
                btn.addEventListener('click', () => selectBlock(i));
                blockSelector.appendChild(btn);
            }
        }

        // Cambiar de Bloque de estudio
        function selectBlock(blockNum) {
            currentBlock = blockNum;
            filteredCards = vocabularyData.filter(card => card.block === currentBlock);
            currentIndex = 0;
            
            // Actualizar estado activo en los botones
            document.querySelectorAll('.block-btn').forEach((btn, idx) => {
                if (idx + 1 === blockNum) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            updateCard(currentIndex);
        }

        // Renderizar tarjeta actual
        function updateCard(index) {
            cardContainer.classList.remove('flipped');
            
            setTimeout(() => {
                const data = filteredCards[index];
                cardIcon.textContent = data.icon;
                cardWord.textContent = data.word;
                cardPhonetic.textContent = data.phonetic;
                cardTranslation.textContent = data.translation;
                cardExample.textContent = data.example;
                cardExampleTrans.textContent = data.exampleTrans;
                counterElement.textContent = `${index + 1} / ${filteredCards.length}`;
            }, 150);
        }

        // Eventos de interacción
        cardContainer.addEventListener('click', () => {
            cardContainer.classList.toggle('flipped');
        });

        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = (currentIndex - 1 + filteredCards.length) % filteredCards.length;
            updateCard(currentIndex);
        });

        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = (currentIndex + 1) % filteredCards.length;
            updateCard(currentIndex);
        });

        // Inicialización
        initBlockSelectors();
        selectBlock(1);
    </script>
</body>
</html>
