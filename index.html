<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards de Vocabulario</title>
    <style>
        /* Paleta de colores basada en la línea gráfica aprobada */
        :root {
            --bg-color: #0f172a; /* Azul oscuro profundo */
            --card-bg: #1e293b; /* Azul grisáceo de la tarjeta */
            --text-primary: #f59e0b; /* Amarillo/Naranja vibrante (títulos) */
            --text-secondary: #94a3b8; /* Gris claro para transcripciones y texto secundario */
            --text-muted: #64748b; /* Gris oscuro para instrucciones menores */
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            --border-radius: 20px;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: var(--text-primary);
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Contenedor de la Tarjeta con efecto Flip */
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 380px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* Caras de la Tarjeta */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: var(--border-radius);
            background-color: var(--card-bg);
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #1e294b; /* Variación sutil de fondo para el reverso */
        }

        /* Elementos Gráficos (La línea sugerida) */
        .graphic-icon {
            font-size: 4.5rem; /* Tamaño óptimo para las ilustraciones/emojis */
            margin-top: 10px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.15));
            user-select: none;
        }

        /* Textos */
        .word {
            color: var(--text-primary);
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin: 15px 0 5px 0;
        }

        .phonetic {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-style: italic;
            font-family: "Lucida Sans Unicode", "DejaVu Sans", sans-serif;
            margin-bottom: 20px;
        }

        .action-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            margin-bottom: 5px;
        }

        /* Reverso de la tarjeta */
        .translation {
            color: var(--text-primary);
            font-size: 2rem;
            font-weight: 700;
            margin-top: 20px;
        }

        .example-sentence {
            color: #ffffff;
            font-size: 1.1rem;
            line-height: 1.5;
            margin: 20px 0;
            max-width: 90%;
        }

        .example-translation {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-style: italic;
        }

        /* Navegación y controles */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 10px;
        }

        .btn {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
        }

        .counter {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h1>My English Vocabulary</h1>

    <div class="container">
        <!-- Tarjeta Interactiva -->
        <div class="card-container" id="cardContainer">
            <div class="card-inner">
                <!-- Frente (Pregunta) -->
                <div class="card-front">
                    <div class="graphic-icon" id="cardIcon">🦊</div>
                    <div>
                        <div class="word" id="cardWord">Cunning</div>
                        <div class="phonetic" id="cardPhonetic">/ˈkʌn.ɪŋ/</div>
                    </div>
                    <div class="action-text">Click to flip</div>
                </div>
                <!-- Reverso (Respuesta) -->
                <div class="card-back">
                    <div class="translation" id="cardTranslation">Astuto / Maquiavélico</div>
                    <div>
                        <div class="example-sentence" id="cardExample">"He is cunning enough to find a way out."</div>
                        <div class="example-translation" id="cardExampleTrans">"Él es lo bastante astuto para encontrar una salida."</div>
                    </div>
                    <div class="action-text">Click to flip</div>
                </div>
            </div>
        </div>

        <!-- Controles de Navegación -->
        <div class="controls">
            <button class="btn" id="prevBtn">← Anterior</button>
            <span class="counter" id="cardCounter">1 / 6</span>
            <button class="btn" id="nextBtn">Siguiente →</button>
        </div>
    </div>

    <script>
        // Set de datos estructurado con la nueva guía visual y de contenido
        const flashcards = [
            {
                word: "Shrewd",
                phonetic: "/ʃruːd/",
                translation: "Astuto / Perspicaz",
                icon: "🧠", // El cerebro aprobado de la primera versión
                example: "She is a shrewd businesswoman.",
                exampleTrans: "Ella es una empresaria perspicaz."
            },
            {
                word: "Cunning",
                phonetic: "/ˈkʌn.ɪŋ/",
                translation: "Astuto / Sagaz",
                icon: "🦊", // El zorro aprobado de la primera versión
                example: "He is cunning enough to find a way out.",
                exampleTrans: "Él es lo bastante astuto para encontrar una salida."
            },
            {
                word: "Standoffish",
                phonetic: "/ˌstændˈɒf.ɪʃ/",
                translation: "Distante / Frío",
                icon: "🙉", // Mono serio tapándose los oídos (sin sonrisa) para actitud fría/distante
                example: "She was cold and standoffish at the party.",
                exampleTrans: "Ella estuvo fría y distante en la fiesta."
            },
            {
                word: "To point out",
                phonetic: "/toʊ pɔɪnt aʊt/",
                translation: "Señalar / Indicar",
                icon: "👉", // Mano apuntando directamente
                example: "He pointed out the mistake on the map.",
                exampleTrans: "Él señaló el error en el mapa."
            },
            {
                word: "To snoop",
                phonetic: "/toʊ snuːp/",
                translation: "Curiosidad / Fisgonear",
                icon: "👀", // Ojos fisgoneando
                example: "Don't snoop around my office.",
                exampleTrans: "No andes fisgoneando por mi oficina."
            },
            {
                word: "Gullible",
                phonetic: "/ˈɡʌl.ə.bəl/",
                translation: "Ingenuo / Crédulo",
                icon: "🐠", // Pez ingenuo cayendo en la trampa
                example: "They sell useless gadgets to gullible tourists.",
                exampleTrans: "Venden aparatos inútiles a turistas crédulos."
            }
        ];

        let currentIndex = 0;
        const cardContainer = document.getElementById('cardContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const counterElement = document.getElementById('cardCounter');

        // Referencias a los campos dinámicos
        const cardIcon = document.getElementById('cardIcon');
        const cardWord = document.getElementById('cardWord');
        const cardPhonetic = document.getElementById('cardPhonetic');
        const cardTranslation = document.getElementById('cardTranslation');
        const cardExample = document.getElementById('cardExample');
        const cardExampleTrans = document.getElementById('cardExampleTrans');

        // Función para actualizar los datos de la tarjeta
        function updateCard(index) {
            // Quitamos la clase 'flipped' para que vuelva a mostrar el frente al cambiar de palabra
            cardContainer.classList.remove('flipped');
            
            // Esperamos un momento a que termine la animación de regreso antes de cambiar el texto
            setTimeout(() => {
                const data = flashcards[index];
                cardIcon.textContent = data.icon;
                cardWord.textContent = data.word;
                cardPhonetic.textContent = data.phonetic;
                cardTranslation.textContent = data.translation;
                cardExample.textContent = data.example;
                cardExampleTrans.textContent = data.exampleTrans;
                counterElement.textContent = `${index + 1} / ${flashcards.length}`;
            }, 150);
        }

        // Eventos
        cardContainer.addEventListener('click', () => {
            cardContainer.classList.toggle('flipped');
        });

        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Evita que la tarjeta gire al pulsar el botón
            currentIndex = (currentIndex - 1 + flashcards.length) % flashcards.length;
            updateCard(currentIndex);
        });

        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Evita que la tarjeta gire al pulsar el botón
            currentIndex = (currentIndex + 1) % flashcards.length;
            updateCard(currentIndex);
        });

        // Inicializar la primera vista
        updateCard(currentIndex);
    </script>
</body>
</html>
